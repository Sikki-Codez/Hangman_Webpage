  name: Python Application CI

  on:
    push:
      branches: [ "main", "master" ]
    pull_request:
      branches: [ "main", "master" ]

  jobs:
    verify-code:
      runs-on: ubuntu-latest

      steps:
      # Step 1: Clone your project repository onto the cloud server
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Provision a clean Python sandbox environment
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12' # Stable runner version to guarantee environment health

      # Step 3: Install all listed requirements (Flask, pg8000, etc.)
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Step 4: Verify Python Syntax Integration
      - name: Check Syntax Compilation
        run: |
          # Compiles the script to check for indentation, syntax, or broken compilation issues
          python -m py_compile Hangman.py